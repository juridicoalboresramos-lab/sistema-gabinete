{% extends 'base.html' %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm rounded-4 text-center">
      <div class="card-body p-5">
        <div class="display-3 fw-bold text-primary">{{ code }}</div>
        <h1 class="h3 fw-bold mt-3">{{ message }}</h1>
        <a href="{{ url_for('dashboard') if session.user_id else url_for('index') }}" class="btn btn-brand rounded-pill px-4 mt-3">Volver</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
