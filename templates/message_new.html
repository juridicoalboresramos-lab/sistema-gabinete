{% extends 'base.html' %}
{% block title %}Nuevo mensaje{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-9">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4 p-lg-5">
        <h1 class="h2 fw-bold mb-1">Redactar mensaje</h1>
        <p class="text-muted mb-4">Envía una comunicación institucional a una dirección o al administrador.</p>

        <form method="post" enctype="multipart/form-data" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Destinatario</label>
            <select name="recipient_id" class="form-select rounded-3" required>
              <option value="">Selecciona...</option>
              {% for user in recipients %}
              <option value="{{ user.id }}">{{ user.full_name }} ({{ user.username }})</option>
              {% endfor %}
            </select>
          </div>
          {% if session.role == 'admin' %}
          <div class="col-md-6">
            <label class="form-label">Actividad ligada (opcional)</label>
            <select name="activity_id" class="form-select rounded-3">
              <option value="">Sin actividad ligada</option>
              {% for a in activities %}
              <option value="{{ a.id }}" {% if request.args.get('activity_id') == a.id|string %}selected{% endif %}>{{ a.folio }} - {{ a.title }}</option>
              {% endfor %}
            </select>
          </div>
          {% else %}
          <input type="hidden" name="activity_id" value="{{ request.args.get('activity_id', '') }}">
          {% endif %}

          <div class="col-12">
            <label class="form-label">Asunto</label>
            <input name="subject" class="form-control rounded-3" required>
          </div>
          <div class="col-12">
            <label class="form-label">Mensaje</label>
            <textarea name="body" rows="6" class="form-control rounded-3" required></textarea>
          </div>
          <div class="col-12">
            <label class="form-label">Adjunto (opcional)</label>
            <input type="file" name="file" class="form-control rounded-3">
          </div>
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-brand rounded-pill px-4">Enviar mensaje</button>
            <a href="{{ url_for('messages') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
